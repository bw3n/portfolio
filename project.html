<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Project Detail — Boon's Portfolio">
  <title>Project — Boon</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Page Transition Overlay -->
  <div class="page-transition" id="pageTransition"></div>

  <!-- Notch Navigation -->
  <nav class="notch-nav" id="notchNav">
    <span class="notch-logo" id="notchLogo"></span>
    <div class="notch-links" id="notchLinks"></div>
  </nav>

  <!-- Project Hero Image -->
  <section class="project-hero" id="projectHero"></section>

  <!-- Project Info -->
  <section class="project-info" id="projectInfo"></section>

  <!-- Content Blocks -->
  <section class="content-blocks" id="contentBlocks"></section>

  <!-- Sync Button -->
  <button class="sync-toggle" id="syncToggle" title="Sync from data.js" onclick="syncFromFile()">↻</button>

  <!-- Edit Mode Toggle -->
  <button class="edit-toggle" id="editToggle">Edit</button>

  <!-- Edit Toolbar -->
  <div class="edit-toolbar" id="editToolbar">
    <button onclick="addContentBlock('full-image')">+ Full Image</button>
    <button onclick="addContentBlock('image-grid')">+ Image Grid</button>
    <button onclick="addContentBlock('text')">+ Text</button>
    <button onclick="addContentBlock('two-column')">+ Two Column</button>
    <button onclick="addContentBlock('video')">+ Video</button>
    <button onclick="exportData()">Export Data</button>
    <button class="primary" onclick="saveData(); showToast('Saved!');">Save</button>
  </div>

  <!-- Toast notification -->
  <div id="toast" style="
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1A1A1A; color: #fff; font-family: var(--font-body); font-size: 13px;
    padding: 10px 24px; border-radius: 50px; opacity: 0; pointer-events: none;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 3000;
  "></div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/editor.js"></script>
</body>
</html>
