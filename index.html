<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Boon — Creative Portfolio. Currently Pushin' Ps in Digitas Singapore.">
  <title>Boon — Portfolio</title>
  <link rel="icon" type="image/png" href="assets/boon-logo.png">
  <link rel="apple-touch-icon" href="assets/boon-logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Viewport Outer (dark background) -->
  <div class="viewport-outer">
    <div class="site-frame" id="siteFrame">

      <!-- Site Header -->
      <header class="site-header" id="siteHeader">
        <div class="site-header-left"></div>
        <nav class="notch-nav" id="notchNav">
          <span class="site-logo" id="notchLogo" data-editable="site.logo"></span>
          <div class="notch-links-shell">
            <div class="notch-links" id="notchLinks"></div>
          </div>
        </nav>
        <div class="site-header-right"></div>
      </header>

      <!-- Work View -->
      <div id="workView">
        <!-- Hero Section -->
        <section class="hero" id="hero">
          <p class="hero-eyebrow">WORK</p>
          <h1 class="hero-title" id="heroTitle"></h1>
        </section>

        <!-- Projects Grid -->
        <section class="projects-grid" id="projectsGrid"></section>
      </div>

      <!-- Lab View -->
      <div id="labView" style="display: none;">
        <section class="hero" id="labHero">
          <p class="hero-eyebrow">LAB</p>
          <h1 class="hero-title" id="labTitle"></h1>
        </section>

        <section class="projects-grid" id="labProjectsGrid"></section>
      </div>

      <!-- About View -->
      <div id="aboutView" style="display: none;">
        <section class="about-section" id="aboutSection"></section>
      </div>

    </div><!-- /site-frame -->
  </div><!-- /viewport-outer -->

  <footer class="site-footer" id="siteFooter"></footer>

  <!-- Sync Button -->
  <button class="sync-toggle" id="syncToggle" title="Sync from data.js" onclick="syncFromFile()">↻</button>

  <!-- Edit Mode Toggle -->
  <button class="edit-toggle" id="editToggle">Edit</button>

  <!-- Edit Toolbar -->
  <div class="edit-toolbar" id="editToolbar">
    <button onclick="addNewProject()">+ Add Project</button>
    <button onclick="exportData()">Export Data</button>
    <button class="primary" onclick="saveData(); showToast('Saved!');">Save</button>
  </div>

  <!-- Toast notification -->
  <div id="toast" style="
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1A1A1A; color: #fff; font-family: var(--font-body); font-size: 13px;
    padding: 10px 24px; border-radius: 50px; opacity: 0; pointer-events: none;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 3000;
  "></div>

  <!-- Scripts -->
  <script defer src="js/data.js"></script>
  <script defer src="js/core.js"></script>
  <script defer src="js/app.js"></script>
</body>
</html>
